services:
  enterprise-qa-agent:
    build: .
    ports:
      - "8030:8030"
    volumes:
      - ./data:/app/data:ro
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8030/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
